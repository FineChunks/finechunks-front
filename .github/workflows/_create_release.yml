name: create release

on:
  workflow_call:
    inputs:
      version:
        type: string
        description: 'Version to create'
        required: true
    secrets:
      TOKEN:
        required: true

    outputs:
      branch_name:
        description: 'Branch name'
        value: ${{ jobs.create_release.outputs.branch_name }}

env:
  node-version: 22.x

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.release.outputs.branch_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # important for git log
          ref: developpement # checkout the developpement branch

      - name: Create Release
        run: |
          git config --global user.name gitHub-actions
          git config --global user.email "github-actions@github.com"

      - name: Set version
        run: |
          git checkout -b release-${{ inputs.version }}
          npm version --no-git-tag-version --force --tag-version-prefix='' --ignore-scripts ${{ inputs.version }}

      - name: Push Release
        id: release
        run: |
          git push origin release-${{ inputs.version }}
          git tag -a v${{ inputs.version }} -m "Release v${{ inputs.version }}"
          git push origin v${{ inputs.version }}
          echo "branch_name=release-${{ inputs.version }}" >> "$GITHUB_OUTPUT"
