name: enable branch protection rules

on:
  workflow_call:
    inputs:
      branch:
        type: string
        description: 'Branch to checkout'
        required: true
    secrets:
      TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      branch:
        type: string
        description: 'Branch to checkout'
        required: true

jobs:
  enable_branch_protection:
    name:
    runs-on: ubuntu-latest
    steps:
      - name: Enable branch protection rules
        run: |
          curl -L \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/OWNER/REPO/branches/BRANCH/protection \
            -d '{"required_status_checks": {"strict": true,"contexts": []},"enforce_admins": true,"allow_force_pushes": false,"allow_deletions": false,"block_creations": true,"required_conversation_resolution": true,"lock_branch": true,"allow_fork_syncing": false}'
