name: bump into a new version

on:
  workflow_call:
    inputs:
      versionType:
        type: string
        description: 'Version type to bump'
        required: true
      branch:
        type: string
        description: 'Branch to checkout'
        required: true
    outputs:
      version:
        description: 'Version number'
        value: ${{ jobs.next_version.outputs.version }}

env:
  node-version: 22.x

jobs:
  next_version:
    name: Get next version
    runs-on: ubuntu-latest
    permissions:
      contents: write # for pushing the version bump
      pull-requests: write # for merging the version bump

    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # important for git log
          ref: ${{ inputs.branch }} # checkout the branch that triggered the workflow

      - name: Get next version
        id: get_version
        run: |
          version=$(npm version --no-git-tag-version --force --tag-version-prefix='' --ignore-scripts patch)
          echo "next_version=$version" >> "$GITHUB_OUTPUT"
          echo "Version number will be $version"

      - name: push version
        run: |
          git config --global user.name gitHub-actions
          git config --global user.email "github-actions@github.com"

          git checkout -b version/bump
          git add package.json package-lock.json
          git commit -m "Bump version"
          git push origin version/bump

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.TOKEN }}
          commit-message: 'chore: bump version'
          title: 'chore: bump version'
          body: |
            This PR was automatically created by GitHub Actions.
          branch: version/bump
          delete-branch: true
          base: developpement

      - name: Auto-merge the PR
        if: steps.cpr.outputs.pull-request-number != ''
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --delete-branch --admin
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
