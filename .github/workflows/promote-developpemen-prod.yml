name: promote-developpement-to-prod

on:
  workflow_dispatch:
    inputs:
      versionType:
        type: choice
        description: 'Version type to bump'
        default: 'patch'
        options:
          - patch
          - minor
          - major
        required: true

jobs:
  bump-version:
    name: Bump Version
    uses: ./.github/workflows/_bump_version.yml
    with:
      versionType: ${{ github.event.inputs.versionType || 'patch' }}

  create-release:
    name: Create Release
    uses: ./.github/workflows/_create_release.yml
    needs: bump-version
    with:
      version: ${{ needs.bump-version.outputs.version }}

  disable-dev-protection:
    name: Disable Branch Protection
    uses: ./.github/workflows/_disable_protection.yml
    needs: create-release
    with:
      branch: developpement
    secrets:
      TOKEN: ${{ secrets.TOKEN }}

  disable-prod-protection:
    name: Disable Release-Developpement Branch Protection
    uses: ./.github/workflows/_disable_protection.yml
    needs: create-release
    with:
      branch: production
    secrets:
      TOKEN: ${{ secrets.TOKEN }}

  release-to-production:
    name: Release to Production
    runs-on: ubuntu-latest
    needs: [disable-dev-protection, disable-prod-protection, create-release]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # important for git log
          ref: release-${{ needs.create-release.outputs.branch_name }} # checkout the release branch

      - name: Configure Git
        run: |
          git config --global user.name gitHub-actions
          git config --global user.email "github-actions@github.com"
          git config --global pull.ff only

      - name: Delete Production Branch if it exists
        run: |
          git fetch origin --prune
          if git show-ref --verify --quiet refs/heads/production; then
            git push origin --delete production
          fi

      - name: Push Release to Production
        run: |
          git checkout -b production
          git push origin production --force
