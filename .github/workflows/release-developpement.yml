name: Merge Develop to Release-Developpement

on:
  schedule:
    - cron: '0 5 * * *' # Every day at 5am UTC (adjust if needed)

  workflow_dispatch: # Allows manual triggering too

permissions:
  contents: write # for pushing the version bump
  pull-requests: write # for merging the version bump

jobs:
  bump-version:
    uses: ./.github/workflows/bump_version.yml
    with:
      versionType: ${{ github.event.inputs.versionType || 'patch' }}
      branch: developpement # checkout the developpement branch
    secrets:
      personal_access_token: ${{ secrets.TOKEN }}
    permissions:
      contents: write # for pushing the version bump
      pull-requests: write # for merging the version bump

  merge:
    runs-on: ubuntu-latest
    needs: bump-version

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # important for git log
          ref: developpement # checkout the developpement branch

      - name: Set up Git identity
        run: |
          git config --global user.name gitHub-actions
          git config --global user.email "github-actions@github.com"
          git config --global pull.ff only

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          title: 'Merge developpement into release-developpement'
          body: 'This PR merges the developpement branch into release-developpement.'
          branch: release-developpement-merge-${{ github.run_id }}
          delete-branch: true
          base: release-developpement # target branch
          head: developpement # source branch
          commit-message: 'Merge developpement into release-developpement'

      - name: Auto-merge the PR
        if: steps.cpr.outputs.pull-request-number != ''
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --delete-branch --admin
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
