name: Merge Develop to Release-Developpement

on:
  schedule:
    - cron: '0 5 * * *' # Every day at 5am UTC (adjust if needed)

  workflow_dispatch: # Allows manual triggering too
    inputs:
      versionType:
        type: choice
        description: 'Version type to bump'
        default: 'patch'
        options:
          - patch
          - minor
          - major
        required: true

permissions:
  contents: write # for pushing the version bump
  pull-requests: write # for merging the version bump

jobs:
  bump-version:
    uses: ./.github/workflows/bump_version.yml
    with:
      versionType: ${{ github.event.inputs.versionType || 'patch' }}
      branch: developpement # checkout the developpement branch
    secrets:
      TOKEN: ${{ secrets.TOKEN }}
    permissions:
      contents: write # for pushing the version bump
      pull-requests: write # for merging the version bump

  merge:
    runs-on: ubuntu-latest
    needs: bump-version

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # important for git log

      - name: Set up Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions@github.com"

      - name: Checkout to new branch
        run: |
          git checkout developpement
          git pull origin developpement
          git checkout -b release-developpement-merge-${{ github.run_id }}
          git push origin release-developpement-merge-${{ github.run_id }}

      - name: Create Pull Request with GitHub CLI
        run: |
          gh pr create \
            --base release-developpement \
            --head release-developpement-merge-${{ github.run_id }} \
            --title "Merge developpement into release-developpement" \
            --body "This PR merges the developpement branch into release-developpement." \
        env:
          GH_TOKEN: ${{ secrets.TOKEN }} # PAT or inherited token with repo/pull access

      - name: Auto-merge the PR
        run: |
          pr_number=$(gh pr list --head version/bump-${{ github.run_id }} --json number -q '.[0].number')
          gh pr merge "$pr_number" --squash --delete-branch --admin
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
