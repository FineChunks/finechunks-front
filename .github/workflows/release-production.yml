name: Release Production

on:
  workflow_dispatch: # Allows manual triggering too

jobs:
  disable-protection:
    name: Deactivate Branch Protection
    uses: ./.github/workflows/_disable_protection.yml
    with:
      branch: release-production
    secrets:
      TOKEN: ${{ secrets.TOKEN }}

  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # important for git log
          ref: production # checkout the production branch

      - name: Set up Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions@github.com"

      - name: Delete release-production branch if it exists
        run: |
          git fetch origin --prune
          if git show-ref --verify --quiet refs/heads/release-production; then
            git push origin --delete release-production
          fi

      - name: Create release-production branch
        run: |
          git checkout -b release-production
          git push origin release-production

  activate-protection:
    name: Activate Branch Protection
    uses: ./.github/workflows/_activate_protection.yml
    with:
      branch: release-production
    secrets:
      TOKEN: ${{ secrets.TOKEN }}
