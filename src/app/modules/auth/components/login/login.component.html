<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Login</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" required />
          <mat-error *ngIf="email?.errors?.['required']"> Email is required </mat-error>
          <mat-error *ngIf="email?.errors?.['email']"> Please enter a valid email address </mat-error>
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Password</mat-label>
          <input matInput [type]="hide ? 'password' : 'text'" formControlName="password" required />
          <button mat-icon-button matSuffix (click)="togglePasswordVisibility()" type="button">
            <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="password?.errors?.['required']"> Password is required </mat-error>
          <mat-error *ngIf="password?.errors?.['minlength']"> Password must be at least 6 characters long </mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="!loginForm.valid" class="full-width">Login</button>
      </form>
    </mat-card-content>
    <mat-card-actions align="end">
      <a [routerLink]="['/auth/sign-in']" routerLinkActive="router-link-active">Don't have an account? Sign up</a>
    </mat-card-actions>
  </mat-card>
</div>
